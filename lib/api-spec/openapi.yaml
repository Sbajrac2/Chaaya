openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Chaaya Mental Health App API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: checkins
    description: Daily check-in operations
  - name: insights
    description: AI-generated insights
  - name: weather
    description: Weather data
  - name: pulse
    description: Community pulse data
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /checkins:
    post:
      operationId: createCheckin
      tags: [checkins]
      summary: Submit a daily check-in
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCheckinRequest"
      responses:
        "201":
          description: Check-in created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Checkin"
    get:
      operationId: getCheckins
      tags: [checkins]
      summary: Get recent check-ins
      parameters:
        - name: sessionId
          in: query
          required: true
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 30
      responses:
        "200":
          description: List of check-ins
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Checkin"

  /checkins/garden:
    get:
      operationId: getGarden
      tags: [checkins]
      summary: Get garden/resilience data
      parameters:
        - name: sessionId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Garden data with petals
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GardenData"

  /insights:
    post:
      operationId: generateInsight
      tags: [insights]
      summary: Generate an AI insight based on check-ins and weather
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InsightRequest"
      responses:
        "200":
          description: AI-generated insight
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InsightResponse"

  /insights/email:
    post:
      operationId: generateExtensionEmail
      tags: [insights]
      summary: Generate a professor extension request email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExtensionEmailRequest"
      responses:
        "200":
          description: Generated email
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtensionEmailResponse"

  /insights/focus:
    post:
      operationId: focusFunnel
      tags: [insights]
      summary: Pick one task matched to current energy and weather
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FocusFunnelRequest"
      responses:
        "200":
          description: Selected task with reasoning
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FocusFunnelResponse"

  /insights/bio-validation:
    post:
      operationId: generateBioValidation
      tags: [insights]
      summary: Generate a bio-validation card after check-in
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BioValidationRequest"
      responses:
        "200":
          description: Bio-validation insight
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BioValidationResponse"

  /weather:
    get:
      operationId: getWeather
      tags: [weather]
      summary: Get weather data for a location
      parameters:
        - name: lat
          in: query
          required: true
          schema:
            type: number
        - name: lon
          in: query
          required: true
          schema:
            type: number
      responses:
        "200":
          description: Weather data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeatherData"

  /pulse:
    get:
      operationId: getCommunityPulse
      tags: [pulse]
      summary: Get anonymized community stress pulse
      responses:
        "200":
          description: Community pulse data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommunityPulse"

  /graph/{sessionId}:
    get:
      operationId: getGraph
      tags: [graph]
      summary: Get knowledge graph for session
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Graph nodes and edges
          content:
            application/json:
              schema:
                type: object
                properties:
                  nodes:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        label:
                          type: string
                        data:
                          type: object
                  edges:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        source:
                          type: string
                        target:
                          type: string
                        label:
                          type: string

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    CreateCheckinRequest:
      type: object
      properties:
        sessionId:
          type: string
        attendedClass:
          type: boolean
        ateWell:
          type: boolean
        maskingLevel:
          type: integer
          minimum: 1
          maximum: 5
        holdDurationMs:
          type: integer
          description: How long user held the stone in milliseconds
        interactionLatencyMs:
          type: number
          description: Average milliseconds between micro-movements (cognitive load indicator)
        lat:
          type: number
          nullable: true
        lon:
          type: number
          nullable: true
        wakeTime:
          type: string
          nullable: true
          description: What time the user woke up today (e.g. "7:30 AM")
        leftRoom:
          type: boolean
          nullable: true
          description: Whether the user left their room today
        hadPhysicalContact:
          type: boolean
          nullable: true
          description: Whether the user had physical contact with another person today
        hadCognitiveFriction:
          type: boolean
          nullable: true
          description: Whether the user found it hard to start tasks today
        hadSunlightExposure:
          type: boolean
          nullable: true
          description: Whether the user spent time in natural daylight today
        usedSubstanceCoping:
          type: boolean
          nullable: true
          description: Whether the user relied on caffeine or alcohol to cope today
        completedTask:
          type: boolean
          nullable: true
          description: Whether the user finished at least one intended task today
      required:
        - sessionId
        - attendedClass
        - ateWell
        - maskingLevel
        - holdDurationMs
        - interactionLatencyMs

    Checkin:
      type: object
      properties:
        id:
          type: integer
        sessionId:
          type: string
        attendedClass:
          type: boolean
        ateWell:
          type: boolean
        maskingLevel:
          type: integer
        holdDurationMs:
          type: integer
        interactionLatencyMs:
          type: number
        isLateNight:
          type: boolean
        lat:
          type: number
          nullable: true
        lon:
          type: number
          nullable: true
        wakeTime:
          type: string
          nullable: true
        leftRoom:
          type: boolean
          nullable: true
        hadPhysicalContact:
          type: boolean
          nullable: true
        hadCognitiveFriction:
          type: boolean
          nullable: true
        hadSunlightExposure:
          type: boolean
          nullable: true
        usedSubstanceCoping:
          type: boolean
          nullable: true
        completedTask:
          type: boolean
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - sessionId
        - attendedClass
        - ateWell
        - maskingLevel
        - holdDurationMs
        - interactionLatencyMs
        - isLateNight
        - createdAt

    GardenData:
      type: object
      properties:
        totalPetals:
          type: integer
        recentCheckins:
          type: array
          items:
            $ref: "#/components/schemas/Checkin"
        currentStreak:
          type: integer
      required:
        - totalPetals
        - recentCheckins
        - currentStreak

    InsightRequest:
      type: object
      properties:
        sessionId:
          type: string
        weatherData:
          $ref: "#/components/schemas/WeatherData"
        recentCheckins:
          type: array
          items:
            $ref: "#/components/schemas/Checkin"
        academicWeek:
          type: integer
          nullable: true
      required:
        - sessionId
        - recentCheckins

    InsightResponse:
      type: object
      properties:
        note:
          type: string
        cognitiveLoad:
          type: string
          enum: [low, moderate, high]
        showLightenLoad:
          type: boolean
        sanctuarySuggestion:
          type: string
          nullable: true
        bioValidation:
          type: string
          nullable: true
          description: A scientific bio-validation insight about how environmental factors affect the user
        patterns:
          type: array
          items:
            type: string
          description: Specific behavioral patterns Asha noticed from recent check-ins
      required:
        - note
        - cognitiveLoad
        - showLightenLoad

    ExtensionEmailRequest:
      type: object
      properties:
        emailType:
          type: string
          enum:
            - extension
            - absence
            - office-hours
            - accommodation
            - mental-health-day
          default: extension
        professorName:
          type: string
          nullable: true
        courseName:
          type: string
          nullable: true
        assignmentName:
          type: string
          nullable: true
        studentName:
          type: string
          nullable: true
        extraContext:
          type: string
          nullable: true
      required: []

    ExtensionEmailResponse:
      type: object
      properties:
        subject:
          type: string
        body:
          type: string
        mailtoLink:
          type: string
      required:
        - subject
        - body
        - mailtoLink

    FocusFunnelRequest:
      type: object
      properties:
        sessionId:
          type: string
        tasks:
          type: array
          items:
            type: string
        weatherDescription:
          type: string
          nullable: true
        uvIndex:
          type: number
          nullable: true
        sunlightHours:
          type: number
          nullable: true
      required:
        - sessionId
        - tasks

    FocusFunnelResponse:
      type: object
      properties:
        task:
          type: string
        reason:
          type: string
      required:
        - task
        - reason

    BioValidationRequest:
      type: object
      properties:
        sessionId:
          type: string
        weatherData:
          $ref: "#/components/schemas/WeatherData"
        checkin:
          $ref: "#/components/schemas/Checkin"
      required:
        - sessionId
        - checkin

    BioValidationResponse:
      type: object
      properties:
        card:
          type: string
          description: A specific bio-validation insight about how weather/environment is affecting this student
        xpGained:
          type: integer
          description: Wisdom XP points earned
        factType:
          type: string
          enum: [weather, circadian, isolation, nutrition, cognitive, general]
      required:
        - card
        - xpGained
        - factType

    WeatherData:
      type: object
      properties:
        temperature:
          type: number
        description:
          type: string
        uvIndex:
          type: number
        sunlightHours:
          type: number
        barometricPressure:
          type: number
        isLowSunlight:
          type: boolean
        city:
          type: string
      required:
        - temperature
        - description
        - uvIndex
        - sunlightHours
        - barometricPressure
        - isLowSunlight
        - city

    CommunityPulse:
      type: object
      properties:
        totalUsers:
          type: integer
        inDarkStretch:
          type: integer
        percentageDarkStretch:
          type: number
        averageMaskingLevel:
          type: number
        message:
          type: string
      required:
        - totalUsers
        - inDarkStretch
        - percentageDarkStretch
        - averageMaskingLevel
        - message
