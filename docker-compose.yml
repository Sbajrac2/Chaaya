version: '3.8'
services:
  postgres:
    image: postgres:16-alpine
    container_name: aasha_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: aasha
      POSTGRES_PASSWORD: aasha_dev_password
      POSTGRES_DB: aasha_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./lib/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aasha -d aasha_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local

